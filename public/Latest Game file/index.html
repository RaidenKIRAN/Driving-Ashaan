<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <meta
      name="viewport"
      content="width=device-width, height=device-height, initial-scale=1.0, viewport-fit=cover"
    >
    <title>Unity WebGL Player | Traffic Simulation Game</title>
    <style>
      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: #231f20;
      }

      body {
        display: flex;
      }

      #unity-canvas {
        width: 100vw;
        height: 100vh;
        display: block;
        background: #231f20;
        outline: none;
      }
    </style>
  </head>
  <body>
    <canvas id="unity-canvas" width="1280" height="720" tabindex="0"></canvas>
    <script src="Build/Latest Game file.loader.js"></script>
    <script>
      var canvas = document.querySelector("#unity-canvas");
      var isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
      var params = new URLSearchParams(window.location.search);
      var lessonId = params.get("lessonId") || "";
      var focusCanvas = function () {
        if (document.activeElement !== canvas) {
          canvas.focus();
        }
      };
      var postToParent = function (message) {
        if (window.parent && window.parent !== window) {
          window.parent.postMessage(message, window.location.origin);
        }
      };

      window.reportUnitySessionResult = function (payload) {
        var data = payload;

        if (typeof payload === "string") {
          try {
            data = JSON.parse(payload);
          } catch (_error) {
            data = { score: Number(payload) || 0 };
          }
        }

        data = data || {};

        postToParent({
          source: "unity-simulation",
          type: "session-result",
          lessonId: data.lessonId || lessonId,
          score: Number(data.score) || 0,
          completed: Boolean(data.completed),
          resultId: data.resultId || "",
        });
      };

      if (isMobile) {
        document.body.style.textAlign = "left";
      }

      window.addEventListener("load", focusCanvas);
      window.addEventListener("focus", focusCanvas);
      document.addEventListener("visibilitychange", function () {
        if (!document.hidden) {
          focusCanvas();
        }
      });
      canvas.addEventListener("pointerdown", focusCanvas);
      canvas.addEventListener("touchstart", focusCanvas, { passive: true });

      createUnityInstance(canvas, {
        dataUrl: "Build/Latest Game file.data.br",
        frameworkUrl: "Build/Latest Game file.framework.js.br",
        codeUrl: "Build/Latest Game file.wasm.br",
        streamingAssetsUrl: "StreamingAssets",
        companyName: "DefaultCompany",
        productName: "Traffic Simulation Game",
        productVersion: "0.1",
        matchWebGLToCanvasSize: true,
        devicePixelRatio: Math.min(window.devicePixelRatio || 1, 2),
      }).then(function () {
        focusCanvas();
      });
    </script>
  </body>
</html>
