<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <meta name="viewport" content="width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes">
    <title>Unity WebGL Player | Traffic Simulation Game</title>
    <style>
      html,
      body {
        width: 100%;
        height: 100%;
        padding: 0;
        border: 0;
        margin: 0;
        overflow: hidden;
        background: #231f20;
      }

      #unity-canvas {
        position: fixed;
        inset: 0;
        width: 100vw;
        height: 100vh;
        display: block;
        background: #231f20;
      }

      #unity-loading {
        position: fixed;
        inset: 0;
        z-index: 10;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
        background:
          linear-gradient(135deg, rgba(15, 23, 42, 0.96), rgba(17, 24, 39, 0.94)),
          radial-gradient(circle at 50% 20%, rgba(37, 99, 235, 0.24), transparent 38%);
        color: #f8fafc;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        transition: opacity 280ms ease, visibility 280ms ease;
      }

      #unity-loading.is-hidden {
        opacity: 0;
        visibility: hidden;
      }

      .loading-panel {
        width: min(420px, 100%);
        text-align: center;
      }

      .road-mark {
        position: relative;
        width: 116px;
        height: 116px;
        margin: 0 auto 26px;
        overflow: hidden;
        border: 1px solid rgba(96, 165, 250, 0.35);
        border-radius: 28px;
        background: linear-gradient(180deg, #111827, #030712);
        box-shadow: 0 22px 60px rgba(37, 99, 235, 0.28);
        transform: rotate(45deg);
      }

      .road-mark::before {
        content: "";
        position: absolute;
        inset: -18px 48px;
        background: repeating-linear-gradient(
          180deg,
          rgba(248, 250, 252, 0.95) 0 18px,
          transparent 18px 34px
        );
        animation: roadMove 900ms linear infinite;
      }

      .road-mark::after {
        content: "";
        position: absolute;
        inset: 0;
        border: 2px solid rgba(248, 250, 252, 0.08);
        border-radius: 28px;
      }

      .loading-title {
        margin: 0;
        font-size: clamp(24px, 4vw, 38px);
        font-weight: 900;
        letter-spacing: 0;
      }

      .loading-copy {
        margin: 10px 0 24px;
        color: #cbd5e1;
        font-size: 15px;
        line-height: 1.5;
      }

      .progress-track {
        height: 12px;
        overflow: hidden;
        border: 1px solid rgba(96, 165, 250, 0.35);
        border-radius: 999px;
        background: rgba(15, 23, 42, 0.82);
      }

      #unity-progress-fill {
        width: 0%;
        height: 100%;
        border-radius: inherit;
        background: linear-gradient(90deg, #2563eb, #38bdf8, #22c55e);
        box-shadow: 0 0 22px rgba(56, 189, 248, 0.55);
        transition: width 160ms ease;
      }

      .progress-meta {
        display: flex;
        justify-content: space-between;
        gap: 16px;
        margin-top: 12px;
        color: #93c5fd;
        font-size: 13px;
        font-weight: 700;
      }

      @keyframes roadMove {
        from {
          transform: translateY(-34px);
        }

        to {
          transform: translateY(0);
        }
      }
    </style>
  </head>
  <body>
    <canvas id="unity-canvas" width="1280" height="720" tabindex="0" autofocus></canvas>
    <div id="unity-loading" role="status" aria-live="polite">
      <div class="loading-panel">
        <div class="road-mark" aria-hidden="true"></div>
        <h1 class="loading-title">Starting Simulation</h1>
        <p class="loading-copy">Loading the driving environment and preparing controls.</p>
        <div class="progress-track" aria-hidden="true">
          <div id="unity-progress-fill"></div>
        </div>
        <div class="progress-meta">
          <span id="unity-loading-status">Downloading assets</span>
          <span id="unity-progress-label">0%</span>
        </div>
      </div>
    </div>
    <script>
      var lessonId = new URLSearchParams(window.location.search).get('lessonId');

      window.reportUnitySessionResult = function(payload) {
        var parsedPayload = payload;

        try {
          var result = JSON.parse(payload);
          if (lessonId && !result.lessonId) {
            result.lessonId = lessonId;
          }
          parsedPayload = JSON.stringify(result);
        } catch (error) {
          console.error('Invalid Unity session result payload:', error);
          return;
        }

        if (window.parent && window.parent !== window) {
          if (typeof window.parent.reportUnitySessionResult === 'function') {
            window.parent.reportUnitySessionResult(parsedPayload);
          }

          window.parent.postMessage({
            source: 'unity-simulation',
            type: 'session-result',
            payload: parsedPayload
          }, window.location.origin);
        }
      };
    </script>
    <script src="Build/Game file with sound.loader.js"></script>
    <script>
      var canvas = document.querySelector("#unity-canvas");
      var loadingOverlay = document.querySelector("#unity-loading");
      var progressFill = document.querySelector("#unity-progress-fill");
      var progressLabel = document.querySelector("#unity-progress-label");
      var loadingStatus = document.querySelector("#unity-loading-status");

      var setLoadingProgress = function(progress) {
        var percentage = Math.max(0, Math.min(100, Math.round(progress * 100)));
        progressFill.style.width = percentage + "%";
        progressLabel.textContent = percentage + "%";

        if (percentage >= 90) {
          loadingStatus.textContent = "Starting engine";
        } else if (percentage >= 45) {
          loadingStatus.textContent = "Preparing simulation";
        }
      };

      var hideLoadingOverlay = function() {
        setLoadingProgress(1);
        loadingStatus.textContent = "Ready";
        loadingOverlay.classList.add("is-hidden");
      };

      var focusCanvas = function() {
        window.focus();
        canvas.focus();
      };

      window.addEventListener('load', focusCanvas);
      window.addEventListener('focus', focusCanvas);
      document.addEventListener('visibilitychange', function() {
        if (!document.hidden) {
          focusCanvas();
        }
      });
      canvas.addEventListener('pointerdown', focusCanvas);
      canvas.addEventListener('touchstart', focusCanvas, { passive: true });

      createUnityInstance(canvas, {
        dataUrl: "Build/Game file with sound.data.br",
        frameworkUrl: "Build/Game file with sound.framework.js.br",
        codeUrl: "Build/Game file with sound.wasm.br",
        streamingAssetsUrl: "StreamingAssets",
        companyName: "DefaultCompany",
        productName: "Traffic Simulation Game",
        productVersion: "0.1",
        matchWebGLToCanvasSize: true,
        // devicePixelRatio: 1, // Uncomment this to override low DPI rendering on high DPI displays.
      }, setLoadingProgress).then(function() {
        hideLoadingOverlay();
        focusCanvas();
      }).catch(function(error) {
        loadingStatus.textContent = "Simulation failed to load";
        console.error(error);
      });
    </script>
  </body>
</html>
